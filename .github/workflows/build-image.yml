name: Build Image

# Build and push the shared semantic memory server image to GHCR. The Helm chart
# (deployed by ArgoCD from selamy-labs/infrastructure) references this image by
# the immutable sha-<commit> tag, so a merge to main produces a new pinnable tag.
# Pull requests build only (no push) to validate the Dockerfile.

on:
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "src/**"
      - ".github/workflows/build-image.yml"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "src/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
