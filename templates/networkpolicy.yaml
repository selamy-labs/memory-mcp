{{- if .Values.networkPolicy.enabled }}
# No external surface. The MCP server accepts ingress ONLY from the listed agent
# namespaces (and same-namespace pods, e.g. the reindex CronJob). The orchestrator
# off-cluster reaches it via `kubectl port-forward`, never a public endpoint.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "memory-mcp.fullname" . }}
  labels:
    {{- include "memory-mcp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "memory-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Same namespace (reindex CronJob, in-namespace clients).
        - podSelector: {}
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.server.port }}
---
# Postgres is reachable only by this chart's own pods (server + reindex job).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "memory-mcp.postgres.fullname" . }}
  labels:
    {{- include "memory-mcp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "memory-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "memory-mcp.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.port }}
{{- if .Values.embedder.enabled }}
---
# The embedding model is reachable only by this chart's own pods (the server +
# the reindex job, which both compute embeddings). No agent traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "memory-mcp.fullname" . }}-embedder
  labels:
    {{- include "memory-mcp.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "memory-mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: embedder
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "memory-mcp.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 80
{{- end }}
{{- end }}
