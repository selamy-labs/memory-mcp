{{- if .Values.externalSecret.enabled }}
# Postgres password synced from Google Secret Manager into this namespace. The
# value is seeded once out-of-band; it never lives in git or the image.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "memory-mcp.fullname" . }}-pg
  labels:
    {{- include "memory-mcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "memory-mcp.fullname" . }}-pg
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecret.gsmSecret }}
{{- if .Values.externalSecret.embeddingKey.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "memory-mcp.fullname" . }}-embedding
  labels:
    {{- include "memory-mcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ include "memory-mcp.fullname" . }}-embedding
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: {{ .Values.externalSecret.embeddingKey.gsmSecret }}
{{- end }}
{{- end }}
