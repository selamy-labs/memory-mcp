{{- if and .Values.reindex.enabled .Values.reindex.cloneTokenSecret.enabled }}
# Read-only GitHub token for the reindex CronJob to clone PRIVATE source repos,
# synced from Google Secret Manager. The job only reads source markdown; it never
# pushes. Value seeded out-of-band into GSM (never in git or the image).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.reindex.cloneTokenSecret.name }}
  labels:
    {{- include "memory-mcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ .Values.reindex.cloneTokenSecret.name }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.reindex.cloneTokenSecret.key }}
      remoteRef:
        key: {{ .Values.reindex.cloneTokenSecret.gsmSecret | default "memory-mcp-clone-token" }}
{{- end }}
