{{- if .Values.ghcrPull.enabled }}
# imagePullSecret for the private ghcr.io/selamy-labs/memory-mcp image, synced
# from the shared fleet GSM secret (agent-ghcr-pull-dockerconfigjson) into this
# namespace as a kubernetes.io/dockerconfigjson Secret named `ghcr-pull` — the
# same pattern the agent charts use. Value is seeded in GSM out-of-band.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.ghcrPull.secretName }}
  labels:
    {{- include "memory-mcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ .Values.ghcrPull.secretName }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ `{{ .dockerconfigjson }}` }}"
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: {{ .Values.ghcrPull.gsmSecret }}
{{- end }}
