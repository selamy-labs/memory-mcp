# Shared fleet semantic memory — Helm values.
#
# Phase-1 keeps this simple and cheap (rides the existing GKE cluster). No
# external surface: a ClusterIP Service plus a NetworkPolicy that only admits the
# agent namespaces. Secrets come from Google Secret Manager via ExternalSecrets;
# nothing sensitive lives in this file or the image.

# ArgoCD installs this chart; the Application passes argocd.enabled=false. The
# key exists only so the agent-style Application parameter is a no-op here.
argocd:
  enabled: false

nameOverride: ""
fullnameOverride: "memory-mcp"

image:
  repository: ghcr.io/selamy-labs/memory-mcp
  tag: ""           # defaults to .Chart.appVersion; set by CI to an immutable digest/tag
  pullPolicy: IfNotPresent

# imagePullSecrets sync from GSM via the fleet ghcr-pull ExternalSecret pattern.
imagePullSecrets:
  - name: ghcr-pull

# Sync the shared fleet GHCR pull secret into this namespace (so the private
# image can be pulled), mirroring the agent charts. Disable if the image package
# is public or the secret is provided another way.
ghcrPull:
  enabled: true
  secretName: ghcr-pull
  gsmSecret: agent-ghcr-pull-dockerconfigjson

server:
  replicas: 1
  port: 8080
  transport: streamable-http
  # Embedder: `hashing` (default; $0, no API key, fully self-hosted) or `openai`
  # (any OpenAI-compatible /embeddings endpoint — see `embedding` below).
  embedder: hashing
  ensureSchema: true           # create the pgvector schema on start (idempotent)
  # OpenAI-compatible embedder config, used only when embedder=openai. Point
  # base_url at a SELF-HOSTED in-cluster model (e.g. HuggingFace TEI) for a $0
  # true-semantic upgrade, or at a paid provider (FLAG THE COST first). Switching
  # embedder/dim changes the vector dimension and REQUIRES a reindex — recreate
  # the table (drop + ensureSchema) then run the reindex CronJob.
  embedding:
    baseUrl: ""                # e.g. http://text-embeddings.memory.svc:80/v1
    model: "text-embedding-3-small"
    dim: 1536                  # must match the model's output dimension
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

# Self-hosted in-cluster embedding model (HuggingFace TEI). $0, no third-party
# API, no data egress at inference. Disabled by default (hashing stays the safe
# fallback). To switch to true-semantic recall: enable this, set
# server.embedder=openai + server.embedding.baseUrl to this Service + dim=384,
# then drop+recreate the table and reindex (the dim changes from hashing's 512).
embedder:
  enabled: false
  image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9   # amd64; pinned
  model: BAAI/bge-small-en-v1.5     # 384-dim, retrieval-tuned, CPU-friendly
  cacheStorage: 2Gi                 # PVC caches the model weights (warm restarts)
  cacheStorageClassName: ""
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 3Gi

postgres:
  image: pgvector/pgvector:pg16
  database: memory
  user: memory
  port: 5432
  storage: 5Gi
  storageClassName: ""         # cluster default
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# ExternalSecret: the Postgres password is generated once and stored in GSM,
# synced into this namespace as a Secret. Created out-of-band (Terraform declares
# the GSM container; the value is seeded once).
externalSecret:
  enabled: true
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  refreshInterval: 1h
  # GSM secret holding the Postgres password for this store.
  gsmSecret: memory-mcp-pg-password
  # Optional embedding API key (only when server.embedder=openai); off by default.
  embeddingKey:
    enabled: false
    gsmSecret: memory-mcp-embedding-api-key

# NetworkPolicy: only these namespaces may reach the MCP server. No Ingress, no
# external surface. Add a namespace here to grant an agent access.
networkPolicy:
  enabled: true
  allowedNamespaces:
    - nash
    - nolan
    - reeve
    - reid
    - sable
    - axel
    - virtual-louie

# Reindex CronJob: rebuilds the index from the markdown-in-git source of truth.
# An init container shallow-clones each `gitSources` repo into a shared volume,
# then the indexer walks them. markdown-in-git stays the source of truth; the
# index is a rebuildable cache. Enable + set gitSources in the deploying overlay.
reindex:
  enabled: false
  schedule: "0 */6 * * *"
  # Git sources to clone + index. Each: { name, repo (owner/name), ref?, group_id?, subpath? }.
  # Recency is seeded from each file's git commit date (the clone is a real repo).
  # Example (set in the infra Application's Helm parameters):
  #   gitSources:
  #     - { name: session-journal, repo: selamy-labs/session-journal, group_id: fleet }
  gitSources: []
  # Fallback raw path:group_id spec when not using gitSources (e.g. a hostPath mount).
  sources: ""
  # Token for cloning PRIVATE source repos, synced from GSM via ExternalSecrets.
  # Public sources need no token. The job only reads (never pushes).
  cloneTokenSecret:
    enabled: false
    name: memory-mcp-clone-token
    key: token

otel:
  enabled: false
  endpoint: "http://otel-collector.otel-system.svc:4317"
